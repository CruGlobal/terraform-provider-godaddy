name: release-please

on:
  push:
    branches: [main]
  # Allow manual invocation from the Actions tab for first-run bootstrap
  # or after config changes.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.CRU_DEVOPS_GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
