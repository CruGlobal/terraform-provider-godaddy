# Visit https://goreleaser.com for documentation on how to customize this behavior.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      # goreleaser does not work with CGO; it could also complicate usage
      # by users in CI/CD systems like Terraform Cloud, where they are
      # unable to install libraries.
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{.Version}} -X main.commit={{.Commit}}'
    goos:
      - darwin
      - freebsd
      - linux
      - windows
    goarch:
      - '386'
      - amd64
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: '386'
    binary: '{{ .ProjectName }}_v{{ .Version }}'

archives:
  - formats: [zip]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      # If running in CI, pass --batch so gpg knows it's not interactive.
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  # release-please publishes the GitHub Release, then triggers this
  # workflow. Keep `draft: false` so the published release stays
  # immediately visible; set to true if you want manual review before
  # the registry picks it up.
  draft: false

changelog:
  disable: true
